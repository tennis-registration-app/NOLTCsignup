<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tennis Admin Panel</title>
  <link rel="icon" href="data:,">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div id="root"></div>

  <!-- File protocol warning (extracted to module for CSP compliance) -->
  <script type="module" src="/src/shared/bootstrap/fileProtocolWarningEntry.js"></script>

  <!-- Cache warm — parse localStorage JSON so the browser caches it before
       React modules load. Replaced shared-utils.js readDataSafe(); read-only. -->
  <script>
    (function() {
      try {
        var raw = localStorage.getItem('tennisClubData');
        if (raw) JSON.parse(raw);
      } catch(e) {}
    })();
  </script>

  <!-- Vite-bundled React app -->
  <script type="module" src="./main.jsx"></script>
</body>
</html>
