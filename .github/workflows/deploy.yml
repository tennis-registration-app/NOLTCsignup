name: Deploy to GitHub Pages
# LEGACY: GitHub Pages deployment pipeline.
# Automatic trigger disabled — production is served from Vercel.
# Retained for auditability. Can be run manually via workflow_dispatch.
# To confirm Pages status: check GitHub repo Settings → Pages.
# Deletion condition: safe to remove once operator confirms Pages is disabled in repo settings.

on:
  workflow_dispatch:  # Manual only — automatic trigger disabled

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
